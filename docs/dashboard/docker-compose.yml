version: '3.8'

services:
  nginx-dashboard:
    image: nginx:alpine
    container_name: omega-dashboard
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
    networks:
      - omega-net

networks:
  omega-net:
    external: true
    name: omega-net
