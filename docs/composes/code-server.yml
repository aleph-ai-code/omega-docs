version: '3.8'

services:
  code-server:
    image: codercom/code-server:latest
    container_name: code-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /root/data/code-server:/home/coder/.local/share/code-server
      - /root/workspace:/workspace
    environment:
      - PASSWORD=omega2024
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
